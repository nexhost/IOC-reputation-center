<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | IOC Reputation Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/styles.css') }}" rel="stylesheet">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-visual">
        <div class="brand login-brand">
            <div class="brand-shield"><i data-lucide="shield-check"></i></div>
            <div>
                <div class="brand-title">IOC REPUTATION CENTER</div>
                <div class="brand-subtitle">Threat Intelligence &amp; Analysis Platform</div>
            </div>
        </div>
        <div class="login-signal">
            <span></span><span></span><span></span>
            <strong>Defensive SOC Workspace</strong>
            <small>Consultas IOC, casos, reportes y reputación centralizada.</small>
        </div>
    </section>

    <section class="login-card">
        <h1>Acceso SOC</h1>
        <p>Ingrese con su cuenta autorizada para continuar.</p>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form class="stack-form" method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <label>Correo</label>
            <input type="email" name="email" value="analista@soc.local" autocomplete="username" required>
            <label>Contraseña</label>
            <input type="password" name="password" autocomplete="current-password" required>
            <button class="primary-action" type="submit"><i data-lucide="log-in"></i><span>Iniciar sesión</span></button>
        </form>
        <div class="login-hint">
            <span>Usuario inicial</span>
            <strong>analista@soc.local / admin123</strong>
        </div>
    </section>
</main>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
